  <!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | Nexa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6">

  <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-10 rounded-[2.5rem] shadow-2xl">
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-gradient-to-tr from-cyan-400 to-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4">
        <span class="text-white font-black text-xl italic">N</span>
      </div>
      <h2 class="text-2xl font-black">Crea tu cuenta</h2>
      <p class="text-slate-500 text-sm mt-2">Déjanos tus datos para procesar tu crédito</p>
    </div>

    <form action="index.html" class="space-y-5">
      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-400 uppercase">Nombre Completo</label>
        <input type="text" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-cyan-500 outline-none transition-all">
      </div>

      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-400 uppercase">Correo Electrónico</label>
        <input type="email" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-cyan-500 outline-none transition-all">
      </div>

      <div class="space-y-2">
        <label class="text-xs font-bold text-slate-400 uppercase">Crea una Contraseña</label>
        <input type="password" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-cyan-500 outline-none transition-all">
      </div>

      <button type="submit" class="w-full bg-cyan-500 text-slate-950 font-black py-4 rounded-2xl shadow-lg shadow-cyan-500/20 hover:scale-[1.02] transition-transform">
        CONTINUAR A MI CUENTA
      </button>
    </form>
  </div>

</body>

</html>
    
  </body>
